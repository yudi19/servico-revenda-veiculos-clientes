# ============================================================
# Profile LOCAL — aponta para AWS real
# Ativar com: -Dspring.profiles.active=local
#             ou variável de ambiente SPRING_PROFILES_ACTIVE=local
# ============================================================

server.port=8082

# H2 em memória para dev local isolado
spring.datasource.url=jdbc:h2:mem:veiculos_clientes_local;DB_CLOSE_DELAY=-1
spring.h2.console.enabled=true
spring.h2.console.settings.web-allow-others=false

# Credentials: usa DefaultCredentialsProvider do SDK
#   → Ordem: env vars > ~/.aws/credentials > instance profile
# Exporte antes de rodar:
#   $env:AWS_ACCESS_KEY_ID     = "AKIAYDOX5XHGAUIO6E35"
#   $env:AWS_SECRET_ACCESS_KEY = "<sua-secret-key>"
#   $env:AWS_REGION            = "us-east-1"

aws.region=us-east-1
aws.endpoint=

aws.sqs.clientes-commands-url=https://sqs.us-east-1.amazonaws.com/557187971532/revenda-clientes-commands
aws.kms.key-arn=arn:aws:kms:us-east-1:557187971532:key/6965c06c-da2b-4f4b-943c-0a7bc8ed90ac
